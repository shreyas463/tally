# Scrapes the tally service running on the HOST (make run), from inside the
# prometheus container. host.docker.internal works on Docker Desktop
# (mac/windows); on Linux, the extra_hosts entry in docker-compose.yml maps it.
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: tally
    static_configs:
      - targets: ["host.docker.internal:8080"]
