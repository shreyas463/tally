services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tally
      POSTGRES_PASSWORD: tally
      POSTGRES_DB: tally
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL files here run automatically the first time the DB is created.
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      # A real query — only passes once the tally DB exists AND accepts
      # connections, so `--wait` and the migrate step never race first boot.
      test: ["CMD-SHELL", "psql -U tally -d tally -c 'SELECT 1' || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Durable queue for Phase 2. Started only with: docker compose --profile kafka up -d
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    profiles: [kafka]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Metrics stack. Started only with: docker compose --profile obs up -d
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [obs]
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # linux support

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [obs]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  redpanda:
