apiVersion: apps/v1
kind: Deployment
metadata:
  name: tally
  labels: { app: tally }
spec:
  replicas: 2
  selector:
    matchLabels: { app: tally }
  template:
    metadata:
      labels: { app: tally }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: tally
          image: tally:local
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgres://tally:tally@postgres:5432/tally?sslmode=disable
            - { name: QUEUE, value: memory }
            - { name: BATCH_SIZE, value: "1000" }
            - { name: FLUSH_INTERVAL, value: 200ms }
            - { name: WORKERS, value: "4" }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 128Mi }
            limits: { memory: 512Mi }
      # Give in-flight batches time to flush on shutdown (matches the app's
      # graceful-drain logic).
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tally
spec:
  selector: { app: tally }
  ports:
    - port: 8080
      targetPort: 8080
